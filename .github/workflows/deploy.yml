# Push to main → the frontend deploys to Cloudflare Workers.
# (The Rust backend deploys separately: Railway watches this repo and
# rebuilds backend/ on its own when it changes.)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN          API token with "Workers Scripts: Edit"
#   CLOUDFLARE_ACCOUNT_ID         the Cloudflare account id
#   NEXT_PUBLIC_API_URL           the backend URL (inlined into the client bundle)
#   NEXT_PUBLIC_GOOGLE_CLIENT_ID  the Google OAuth client id (also public)
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # node 24 = npm 11, the same npm generation that writes this repo's
      # lockfile — npm 10 (node 22) rejects it over optional @emnapi entries
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # on failure, surface npm's real complaint as an annotation — step
      # logs need admin auth to read, annotations are visible to anyone
      - name: Install dependencies
        run: |
          npm ci || {
            msg=$(grep -hE "npm (error|warn)" /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null | head -c 900)
            [ -z "$msg" ] && msg=$(tail -c 900 /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null)
            echo "::error title=npm ci failed::${msg}"
            exit 1
          }

      - name: Build and deploy to Cloudflare
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
